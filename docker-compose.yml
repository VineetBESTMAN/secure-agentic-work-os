x-app-environment: &app-environment
  APP_ENV: docker
  APP_ASYNC_JOBS_ENABLED: "true"
  APP_ASYNC_JOBS_FALLBACK_SYNC: "false"
  APP_EMBEDDING_PROVIDER: ${APP_EMBEDDING_PROVIDER:-local}
  APP_JOB_QUEUE_NAME: ingestion
  APP_JOB_TIMEOUT_SECONDS: "600"
  APP_SECRET_KEY: change-me
  APP_UPLOAD_DIR: /app/data/uploads
  APP_VECTOR_DIMENSIONS: "384"
  DATABASE_URL: postgresql://postgres:postgres@postgres:5432/agentic_work_os
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
  REDIS_URL: redis://redis:6379/0

services:
  backend:
    build:
      context: ./backend
    environment: *app-environment
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  worker:
    build:
      context: ./backend
    command: ["rq", "worker", "--url", "redis://redis:6379/0", "ingestion"]
    environment: *app-environment
    volumes:
      - backend_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: agentic_work_os
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agentic_work_os"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  backend_data:
  postgres_data:
